name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm typecheck
      # Live suites are gated behind ECPAY_LIVE / EZPAY_LIVE / AMEGO_LIVE and
      # are skipped here — CI runs only the offline (MSW) tests.
      - run: pnpm test
